---
# Source: charta/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-charta
  labels:
    helm.sh/chart: charta-0.1.0
    app.kubernetes.io/name: charta
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: charta
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      labels:
        helm.sh/chart: charta-0.1.0
        app.kubernetes.io/name: charta
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: default
      containers:
        - name: charta
          image: "nginx:1.16.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
