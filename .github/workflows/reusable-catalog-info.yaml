concurrency:
  group: reusable-catalog-info-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    inputs: {}
    secrets: {}

jobs:
  validate-catalog-info:
    name: Catalog info validator
    runs-on:
      group: ubuntu-latest-large-pool
      labels: ubuntu-latest-16core
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"

      - name: Catalog Info Validation
        id: validate
        run: go tool mage catalogInfo:validate
