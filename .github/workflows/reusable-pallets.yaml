concurrency:
  group: reusable-pallets-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    inputs:
      runner-cores:
        type: number
        default: 2
        description: Number of cores to use. supported values is dependendent on runner configurations in https://github.com/organizations/coopnorge/settings/actions/runner-groups/6
    secrets: {}

jobs:
  validate-pallet-config:
    name: Pallets config check
    runs-on:
      group: ubuntu-latest-large-pool
      labels: ubuntu-latest-${{ inputs.runner-cores }}core
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"

      - name: Pallet config validation
        id: validate
        run: go tool mage pallets:validate
