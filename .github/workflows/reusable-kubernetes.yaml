concurrency:
  group: reusable-kubernetes-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    inputs: {}
    secrets: {}

jobs:
  validate-kubernetes:
    name: Validate Kuberenetes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: Checkout coop-mage
        uses: actions/checkout@v6
        with:
          repository: coopnorge/mage
          ref: go-cli
          path: .coop-mage

      - name: Build coop-mage CLI
        run: go build -C .coop-mage -o /tmp/coop-mage ./cmd/coop-mage

      - name: Kubernetes List Detected charts
        id: list
        run: /tmp/coop-mage k8s:list

      - name: Kubernetes validation
        id: validate
        run: /tmp/coop-mage k8s:validate

      - name: Kubernetes validation
        id: diff
        run: /tmp/coop-mage k8s:diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
