concurrency:
  group: reusable-kubernetes-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    inputs: {}
    secrets: {}

jobs:
  validate-kubernetes:
    name: Validate Kubernetes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch the main branch as well
        run: git fetch origin $GITHUB_BASE_REF:$GITHUB_BASE_REF

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: Install go Tools
        run: go install tool

      - name: Kubernetes List Detected charts
        id: list
        run: go tool mage k8s:list

      - name: Kubernetes validation
        id: validate
        run: go tool mage k8s:validate

      - name: Kubernetes diff
        id: diff
        run: go tool mage k8s:diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
