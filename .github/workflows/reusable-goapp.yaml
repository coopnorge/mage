concurrency:
  group: reusable-goapp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    secrets: {}
    inputs:
      oci-image-base:
        type: string
        required: true
      push-oci-image:
        type: boolean
        required: false
        default: false
      workload-identity-provider:
        type: string
        required: true
      service-account:
        type: string
      artifact-registry-location:
        type: string
        default: "europe"
        description: Artifact registry region name (e.g. "europe", "europe-north1").
      go-runtime:
        type: string
        default: "docker"
        description: Run mage go related tasks in "docker" (default) or local
      tag-based-diff:
        type: boolean
        default: true
        required: false
        description: If true it will create a github release based on the tag of the OCI
    outputs:
      oci-images:
        value: ${{ jobs.go-build.outputs.oci-images }}
        description: OCI image references.

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure access to internal and private GitHub repos
        run: git config --global url."https://${{ secrets.REVIEWBOT_GITHUB_TOKEN }}:x-oauth-basic@github.com/coopnorge".insteadOf "https://github.com/coopnorge"
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: Setup Golangci Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          install-only: true
      - name: Install go Tools
        run: go install tool
      - name: Check if coop mage has separeate build commands
        id: has-multiple-cmds
        run: echo "outcome=$(go tool mage -l | grep go:buildBinaries | wc -l)" >> $GITHUB_OUTPUT
      - name: Download Go modules
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v go:downloadModules"
      - name: Run Go Lint
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v go:lint"
        env:
          GO_RUNTIME: ${{ inputs.go-runtime }}

  go-test:
    name: Go Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure access to internal and private GitHub repos
        run: git config --global url."https://${{ secrets.REVIEWBOT_GITHUB_TOKEN }}:x-oauth-basic@github.com/coopnorge".insteadOf "https://github.com/coopnorge"
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: Install go Tools
        run: go install tool
      - name: Check if coop mage has separate build commands
        id: has-multiple-cmds
        run: echo "outcome=$(go tool mage -l | grep go:buildBinaries | wc -l)" >> $GITHUB_OUTPUT
      - name: Download Go modules
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v go:downloadModules"
      - name: Run Go Test
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v go:test"
        env:
          GO_RUNTIME: ${{ inputs.go-runtime }}

  go-build:
    name: Go build
    needs:
      - go-lint
      - go-test
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      packages: read
    outputs:
      oci-images: ${{ steps.oci-images.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure access to internal and private GitHub repos
        run: git config --global url."https://${{ secrets.REVIEWBOT_GITHUB_TOKEN }}:x-oauth-basic@github.com/coopnorge".insteadOf "https://github.com/coopnorge"
      - name: Authenticate with GCP
        id: gcp-auth
        if: ${{ inputs.push-oci-image }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ inputs.workload-identity-provider }}
          service_account: ${{ inputs.service-account }}
          create_credentials_file: true
      # - name: Configure Google Cloud Artifact Registry for Docker
      #   if: ${{ inputs.push-oci-image }}
      #   run: gcloud auth print-access-token | docker login https://${{ inputs.artifact-registry-location }}-docker.pkg.dev -u oauth2accesstoken --password-stdin
      - name: Login to Google Cloud Artifact Registry
        if: ${{ inputs.push-oci-image }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.artifact-registry-location }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}
      - name: Safe Git Workspace
        run: git config --global --add safe.directory /app
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: Install go Tools
        run: go install tool
      - name: Check if coop mage has separate build commands
        id: has-multiple-cmds
        run: echo "outcome=$(go tool mage -l | grep go:buildBinaries | wc -l)" >> $GITHUB_OUTPUT
        # this block requires coopnorge/mage > v0.10.0
      - name: Download Go modules
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v go:downloadModules"
      - name: Run Go Build
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v go:buildBinaries"
      - name: Build Docker Images
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '1' }}
        run: "go tool mage -v docker:buildImages"
        env:
          OCI_IMAGE_BASE: ${{ inputs.oci-image-base }}
          PUSH_IMAGE: ${{ inputs.push-oci-image }}
          GO_RUNTIME: ${{ inputs.go-runtime }}
      # this block is uses when <= v0.10.0
      - name: Build Go and Docker Images
        if: ${{ steps.has-multiple-cmds.outputs.outcome == '0' }}
        run: "go tool mage -v docker:buildAndPush"
        env:
          OCI_IMAGE_BASE: ${{ inputs.oci-image-base }}
          PUSH_IMAGE: ${{ inputs.push-oci-image }}
          GO_RUNTIME: ${{ inputs.go-runtime }}
      - id: oci-images
        name: Output OCI images references
        run: |
          if [ -f ./var/oci-images.json ]; then
            echo "images=$(cat ./var/oci-images.json)" >> $GITHUB_OUTPUT
          else
            echo "images={}" >> $GITHUB_OUTPUT
          fi

      - name: Generate token for release
        id: generate_token
        if: ${{ github.ref == 'refs/heads/main' && inputs.tag-based-diff }}
        # v1.5.1
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # pin@v2.2.1
        with:
          app-id: 172868
          private-key: ${{ secrets.WRITEBACK_APP_PRIVATE_KEY_PEM }}
          owner: coopnorge

      - name: Get tag of the build OCI
        id: oci-tag
        if: ${{ github.ref == 'refs/heads/main' && inputs.tag-based-diff }}
        run: |
          OCI_TAG=$(cat var/oci-images.json | yq -P | grep "tag:" | head -1 | yq '.tag')
          if [[ -z "$OCI_TAG" ]]; then
            echo cannot get an OCI TAG, bailing
            exit 1
          fi
          echo "tag=$(echo $OCI_TAG)" >> $GITHUB_OUTPUT

      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # pin@v7.2.0
        name: Create release
        id: make-release
        if: ${{ github.ref == 'refs/heads/main' && inputs.tag-based-diff }}
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        with:
          commitish: main
          config-name: "release-drafter.yml"
          publish: true
          version: ${{ steps.oci-tag.outputs.tag }}
          tag: ${{ steps.oci-tag.outputs.tag }}
          name: "Go OCI Release ${{ steps.oci-tag.outputs.tag }}"
          # only used when no releases exists. Initial release might be to long
          # with out limitation
          initial-commits-since: "2026-03-01T09:09:09Z"

      - name: Show output
        if: always()
        run: tree var/
