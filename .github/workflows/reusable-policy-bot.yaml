concurrency:
  group: reusable-policy-bot-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_call:
    inputs: {}
    secrets: {}

jobs:
  validate-policy-bot-config:
    name: Policy-bot config check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: Checkout coop-mage
        uses: actions/checkout@v6
        with:
          repository: coopnorge/mage
          ref: go-cli
          path: .coop-mage

      - name: Build coop-mage CLI
        run: go build -C .coop-mage -o /tmp/coop-mage ./cmd/coop-mage

      - name: Policy-bot config validation
        id: validate
        run: /tmp/coop-mage policyBotConfig:validate
